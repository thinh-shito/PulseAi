version: "3.9"

services:
  backend:
    image: pulseai-backend:latest
    build:
      context: ./src-backend
      dockerfile: Dockerfile
    container_name: pulseai-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pulseai-internal
      - pulseai-external
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000


  postgres:
    image: postgres:16-alpine
    container_name: pulseai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulseai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pulseai_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pulseai-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-pulseai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulseai-redis
    networks:
      - pulseai-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  frontend:
    image: pulseai-frontend:latest
    build:
      context: ./src-frontend
      dockerfile: Dockerfile.prod
    container_name: pulseai-frontend
    environment:
      - HOSTNAME=0.0.0.0
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pulseai-external

networks:
  pulseai-internal:
    driver: bridge
    internal: true
  pulseai-external:
    driver: bridge

volumes:
  postgres_data:
    driver: local
