name: Deploy Frontend to Production

on:
  push:
    branches: [main]
    paths:
      - 'src-frontend/**'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Inject Lowercase Repository Name
        run: |
          echo "REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── Set up Docker Buildx & GHCR login ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Authenticate to Google Cloud ────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── Retrieve dynamic Backend URL ─────────────────────
      - name: Get Backend URL
        id: get_backend_url
        run: |
          BACKEND_URL=$(gcloud run services describe pulseai-backend \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --format 'value(status.url)')
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      # ── Build & push frontend image with dynamic URL ─────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src-frontend
          file: ./src-frontend/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy Frontend to Cloud Run ─────────────────────
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy pulseai-frontend \
            --image ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }} \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --port 3000

      # ── Verify Health ────────────────────────────────────
      - name: Verify frontend health
        run: |
          FRONTEND_URL=$(gcloud run services describe pulseai-frontend \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --format 'value(status.url)')
          echo "Frontend URL: $FRONTEND_URL"
          curl -f "$FRONTEND_URL" || exit 1
          echo "✅ Frontend health check passed"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Frontend Deployment ${{ github.sha }} successful at $(date -u)"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Frontend Deployment ${{ github.sha }} FAILED"
          exit 1
