name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Inject Lowercase Repository Name
        run: |
          echo "REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── Build backend image ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src-backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src-frontend
          file: ./src-frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to Cloud Run ──────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy pulseai-backend \
            --image ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }} \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production" \
            --set-secrets "SECRET_KEY=pulseai-secret-key:latest,DATABASE_URL=pulseai-db-url:latest" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --port 8000

      - name: Run DB migrations in Cloud Run job
        run: |
          gcloud run jobs create pulseai-migrate-${{ github.run_number }} \
            --image ghcr.io/${{ env.REPO_LC }}/backend:${{ github.sha }} \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --set-secrets "DATABASE_URL=pulseai-db-url:latest" \
            --command "alembic" \
            --args "upgrade,head" \
            --max-retries 1 \
            --wait || true
          gcloud run jobs execute pulseai-migrate-${{ github.run_number }} \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --wait

      - name: Verify backend health
        run: |
          BACKEND_URL=$(gcloud run services describe pulseai-backend \
            --region ${{ vars.GCP_REGION || 'asia-southeast1' }} \
            --format 'value(status.url)')
          echo "Backend URL: $BACKEND_URL"
          curl -f "$BACKEND_URL/health" || exit 1
          echo "✅ Backend health check passed"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment ${{ github.sha }} successful at $(date -u)"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment ${{ github.sha }} FAILED"
          exit 1
