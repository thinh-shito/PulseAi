name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src-backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src-backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulseai_test
          POSTGRES_PASSWORD: pulseai_test
          POSTGRES_DB: pulseai_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://pulseai_test:pulseai_test@localhost:5432/pulseai_test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-chars-minimum-padded
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: src-backend/requirements.txt

      - name: Install dependencies
        run: |
          cd src-backend
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Lint — flake8
        run: |
          cd src-backend
          flake8 app/ --max-line-length=100 \
            --extend-ignore=E501 \
            --exclude=__pycache__,alembic/
          echo "✅ flake8 passed"

      - name: Security scan — bandit
        run: |
          cd src-backend
          bandit -r app/ -ll -x app/tests || true
          echo "✅ bandit scan complete"

      - name: Run Alembic migrations
        run: |
          cd src-backend
          alembic upgrade head
          echo "✅ Migrations applied"

      - name: Run tests with coverage
        run: |
          cd src-backend
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            --cov-fail-under=65
          echo "✅ Tests passed"

      - name: Health check — validate endpoint exists
        run: |
          cd src-backend
          python -c "
          from app.api.v1.endpoints.health import router
          routes = [r.path for r in router.routes]
          assert '/health' in routes, f'Health route missing: {routes}'
          print('✅ Health endpoint registered')
          "

      - name: Quality gate — check alerting thresholds in code
        run: |
          cd src-backend
          python -c "
          from app.services_ai.nodes.quality_node import quality_node
          # Test that low quality triggers awaiting_approval
          state = {
            'confidence_score': 0.80,
            'prior_auth_form': {'fields': {'f1': 'N/A', 'f2': 'N/A'}}
          }
          result = quality_node(state)
          assert result['processing_status'] == 'awaiting_approval', \
            f'Expected awaiting_approval, got {result[\"processing_status\"]}'
          assert result['quality_score'] < 95, \
            f'Expected score < 95, got {result[\"quality_score\"]}'
          # Test that high quality auto-approves
          state2 = {'confidence_score': 0.99, 'prior_auth_form': {'fields': {'f1': 'val'}}}
          result2 = quality_node(state2)
          assert result2['processing_status'] == 'approved', \
            f'Expected approved, got {result2[\"processing_status\"]}'
          print(f'✅ Quality gate thresholds correct (low={result[\"quality_score\"]:.1f}%, high={result2[\"quality_score\"]:.1f}%)')
          "

  docker-build-backend:
    name: Docker Build Backend Check
    needs: [backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t pulseai-backend:ci ./src-backend
          echo "✅ Backend Docker build passed"
